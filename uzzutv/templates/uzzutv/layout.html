{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uzzutv</title>
    {% block css %}{% endblock %}
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'uzzutv/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'uzzutv/css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'uzzutv/css/style.css' %}">
  <style>
.search-bar{
display:flex;
gap:5px;
width:100%;
max-width:180px;   /* limits width */
/* margin:10px auto;  */
}

.search-bar input{
flex:1;
padding:5px 8px;
border-radius:4px;
border:none;
font-size:14px;
}

.search-bar button{
background:#ff3c3c;
border:none;
color:white;
padding:5px 8px;
border-radius:4px;
cursor:pointer;
font-size:14px;
}






#colorlib-aside {
background: #1b1b1f !important;
}

#colorlib-main-menu ul li a{
color: white !important;
font-size:18px;
display:block;
padding:12px 20px;
}

#colorlib-main-menu ul li a:hover{
color:#ff3c3c !important;
}


@media (max-width:768px){

#colorlib-aside{
width:260px !important;
}

body.offcanvas #colorlib-aside{
left:0 !important;
}

}

.search-bar input{
background:#2a2a2f;
color:white;
}

.search-bar input::placeholder{
color:#bbb;
}

#colorlib-main-menu ul li{
display:block;
margin:10px 0;
}

#colorlib-main-menu ul li a{
color:#111;
font-size:18px;
font-weight:500;
}
</style>
</head>
<body>


<div id="colorlib-page">

<a href="#" class="js-colorlib-nav-toggle colorlib-nav-toggle">
<i></i>
</a>

<aside id="colorlib-aside">

<nav id="colorlib-main-menu">
<ul>

<li class="colorlib-active"><a href="/">Home</a></li>

<li>
<form action="{% url 'search' %}" method="GET" class="search-bar">
<input type="text" name="q" placeholder="Search" required>
<button type="submit">🔍</button>
</form>
</li>

<li><a href="{% url 'home'%}">Movies</a></li>
<li><a href="{% url 'tv'%}">Series</a></li>

</ul>
</nav>

</aside>

<div id="colorlib-main">

{% block body %}
{% endblock %}

</div>

</div>





<script src="{% static 'uzzutv/js/jquery.min.js' %}"></script>
<script src="{% static 'uzzutv/js/popper.js' %}"></script>
<script src="{% static 'uzzutv/js/bootstrap.min.js' %}"></script>
<script src="{% static 'uzzutv/js/main.js' %}"></script>
</body>
</html>
